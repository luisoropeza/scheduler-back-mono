spring:
  application:
    name: scheduler
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/scheduler}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:mysecretpassword}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true

server:
  port: ${PORT:8080}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:*}

jwt:
  secret: ${JWT_SECRET:change-me-in-production-minimum-32-chars!}

security:
  public-paths: /api/auth/**

n8n:
  api-key: ${N8N_API_KEY:change-me-n8n-key}

app:
  mail:
    from: ${MAIL_FROM:no-reply@scheduler.local}
    from-name: ${MAIL_FROM_NAME:Scheduler}
